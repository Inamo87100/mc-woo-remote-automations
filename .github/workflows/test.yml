name: Run Tests

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

jobs:
  test:
    name: PHPUnit (PHP ${{ matrix.php-version }} / WP ${{ matrix.wp-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        php-version: ['7.4', '8.0', '8.1', '8.2', '8.3']
        wp-version: ['6.0', '6.4', '6.5']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer, phpunit
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install WordPress test suite
        run: |
          bash bin/install-wp-tests.sh wordpress_test root '' localhost ${{ matrix.wp-version }}
        env:
          WP_VERSION: ${{ matrix.wp-version }}

      - name: Run MC Remote API unit tests
        run: |
          phpunit \
            --bootstrap mc-remote-api/tests/bootstrap.php \
            mc-remote-api/tests/
        env:
          WP_TESTS_DIR: /tmp/wordpress-tests-lib
          WP_CORE_DIR: /tmp/wordpress

      - name: Run MC-Woo Remote Automations unit tests
        run: |
          phpunit \
            --bootstrap mc-woo-remote-automations/tests/bootstrap.php \
            mc-woo-remote-automations/tests/
        env:
          WP_TESTS_DIR: /tmp/wordpress-tests-lib
          WP_CORE_DIR: /tmp/wordpress

      - name: Run integration tests
        run: |
          phpunit \
            --bootstrap tests/bootstrap.php \
            tests/integration/
        env:
          WP_TESTS_DIR: /tmp/wordpress-tests-lib
          WP_CORE_DIR: /tmp/wordpress
