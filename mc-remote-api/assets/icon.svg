<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#31006F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a1590;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FDB927;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fdd060;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#bg)" />
  <!-- API bracket left -->
  <path d="M30 44 L18 64 L30 84" stroke="#FDB927" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- API bracket right -->
  <path d="M98 44 L110 64 L98 84" stroke="#FDB927" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Connection dots and line -->
  <circle cx="64" cy="64" r="6" fill="url(#accent)" />
  <circle cx="44" cy="64" r="4" fill="#ffffff" opacity="0.8"/>
  <circle cx="84" cy="64" r="4" fill="#ffffff" opacity="0.8"/>
  <line x1="50" y1="64" x2="58" y2="64" stroke="#ffffff" stroke-width="2.5" opacity="0.8"/>
  <line x1="70" y1="64" x2="78" y2="64" stroke="#ffffff" stroke-width="2.5" opacity="0.8"/>
  <!-- Top connection -->
  <circle cx="64" cy="40" r="4" fill="#ffffff" opacity="0.7"/>
  <line x1="64" y1="44" x2="64" y2="58" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
  <!-- Bottom connection -->
  <circle cx="64" cy="88" r="4" fill="#ffffff" opacity="0.7"/>
  <line x1="64" y1="70" x2="64" y2="84" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
  <!-- MC text -->
  <text x="64" y="115" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FDB927" text-anchor="middle" letter-spacing="2">API</text>
