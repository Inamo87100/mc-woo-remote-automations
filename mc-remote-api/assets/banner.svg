<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 772 250" width="772" height="250">
  <defs>
    <linearGradient id="bannerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#31006F;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#4a1590;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a003a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FDB927;stop-opacity:0" />
      <stop offset="30%" style="stop-color:#FDB927;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#FDB927;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FDB927;stop-opacity:0" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="772" height="250" fill="url(#bannerBg)" />
  <!-- Decorative circles -->
  <circle cx="700" cy="30" r="120" fill="#ffffff" opacity="0.03" />
  <circle cx="720" cy="200" r="80" fill="#FDB927" opacity="0.04" />
  <circle cx="50" cy="220" r="100" fill="#ffffff" opacity="0.03" />
  <!-- Accent line bottom -->
  <rect x="0" y="240" width="772" height="4" fill="url(#accentLine)" />
  <!-- Left icon area -->
  <circle cx="80" cy="125" r="50" fill="#4a1590" stroke="#FDB927" stroke-width="2" opacity="0.9"/>
  <path d="M58 105 L46 125 L58 145" stroke="#FDB927" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M102 105 L114 125 L102 145" stroke="#FDB927" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="80" cy="125" r="5" fill="#FDB927" />
  <circle cx="66" cy="125" r="3" fill="#ffffff" opacity="0.8"/>
  <circle cx="94" cy="125" r="3" fill="#ffffff" opacity="0.8"/>
  <line x1="69" y1="125" x2="75" y2="125" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
  <line x1="85" y1="125" x2="91" y2="125" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
  <!-- Plugin name -->
  <text x="155" y="100" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#ffffff" letter-spacing="1">MC Remote API</text>
  <!-- Accent underline -->
  <rect x="155" y="110" width="320" height="3" fill="#FDB927" rx="1.5" />
  <!-- Tagline -->
  <text x="155" y="148" font-family="Arial, sans-serif" font-size="18" fill="#ccaaff" letter-spacing="0.5">Secure REST API for Remote User Management</text>
  <!-- Feature bullets -->
  <circle cx="161" cy="180" r="3" fill="#FDB927"/>
  <text x="172" y="185" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.85">User creation &amp; role assignment</text>
  <circle cx="161" cy="205" r="3" fill="#FDB927"/>
  <text x="172" y="210" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.85">Secure X-MC-SECRET authentication</text>
  <circle cx="161" cy="230" r="3" fill="#FDB927"/>
  <text x="172" y="235" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.85">WooCommerce integration ready</text>
  <!-- Right side branding -->
  <text x="692" y="225" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FDB927" text-anchor="end" opacity="0.9">mambacoding.com</text>
